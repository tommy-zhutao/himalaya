# AI News Hub - 生产环境 Docker Compose 配置
# 使用方法: docker compose -f docker-compose.prod.yml up -d

services:
  # ============ 基础服务 ============
  
  postgres:
    image: postgres:15-alpine
    container_name: news-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: news_app
      POSTGRES_USER: ${DB_USER:-news_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-news_admin} -d news_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    # 生产环境不暴露端口，只允许内部访问
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: news-app-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ============ 后端服务 ============

  news-api:
    build:
      context: ./services/news-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-news_admin}:${DB_PASSWORD}@postgres:5432/news_app
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  user-api:
    build:
      context: ./services/user-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-news_admin}:${DB_PASSWORD}@postgres:5432/news_app
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      JWT_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  admin-api:
    build:
      context: ./services/admin-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-news_admin}:${DB_PASSWORD}@postgres:5432/news_app
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEWS_API_URL: http://news-api:4001
      USER_API_URL: http://user-api:4002
      ADMIN_API_URL: http://admin-api:4003
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
    depends_on:
      - news-api
      - user-api
      - admin-api
      - redis
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============ 抓取服务 ============

  rss-fetcher:
    build:
      context: ./services/rss-fetcher
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-news_admin}:${DB_PASSWORD}@postgres:5432/news_app
      CRON_SCHEDULE: "*/15 * * * *"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  api-fetcher:
    build:
      context: ./services/api-fetcher
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-news_admin}:${DB_PASSWORD}@postgres:5432/news_app
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      GNEWS_API_KEY: ${GNEWS_API_KEY:-}
      CRON_SCHEDULE: "0 * * * *"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  scheduler:
    build:
      context: ./services/scheduler
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      RSS_FETCHER_URL: http://rss-fetcher:4004
      API_FETCHER_URL: http://api-fetcher:4005
      RSS_CRON_SCHEDULE: "*/15 * * * *"
      API_CRON_SCHEDULE: "0 * * * *"
    depends_on:
      - redis
      - rss-fetcher
      - api-fetcher
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============ 前端服务 ============

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.example.com}
    depends_on:
      - api-gateway
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============ 反向代理 ============

  nginx:
    image: nginx:alpine
    container_name: news-app-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/etc/letsencrypt
    depends_on:
      - frontend
      - api-gateway
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_data:
